"$schema" = "https://starship.rs/config-schema.json"

add_newline = true

format = """
[╭─](fg:gray)$directory$git_branch
[╰─$character](fg:gray)
"""

palette = "gruvbox"

[directory]
style = "bold fg:yellow"
format = "[ $path]($style)"
truncation_length = 2
truncation_symbol = "../"

[git_branch]
symbol = "  "
style = "bold fg:aqua"
format = "[ on $symbol$branch]($style)"

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:blue)"
vimcmd_visual_symbol = "[❮](bold fg:yellow)"
vimcmd_replace_symbol = "[❮](bold fg:orange)"
vimcmd_replace_one_symbol = "[❮](bold fg:orange)"

[palettes.gruvbox]
bg0 = "#1d2021"
bg1 = "#3c3836"
bg2 = "#504945"
bg3 = "#665c54"

fg0 = "#fbf1c7"
fg1 = "#ebdbb2"
fg2 = "#d5c4a1"
fg3 = "#bdae93"

red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
purple = "#d3869b"
aqua = "#8ec07c"
orange = "#fe8019"
gray = "#928374"

